<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: white;
        margin: 0;
        padding: 20px;
      }
      .nav-container {
        margin-bottom: 40px;
      }
      h2 {
        margin-bottom: 10px;
      }
      .nav1{
        background-color: #f8f9fa;
        padding: 10px;
      }
      .nav1 ul {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
        justify-content: space-around;
      }
      .nav1 li {
       display: inline;
      }
      .nav1 a { 
        text-decoration: none;
        color: #333;
        padding: 5px 15px;
        position: relative;
      }
      .nav1 a::after {
        content: "";
        width: 100%;
        height: 2px;
        background-color: #21a2c9;
        transform: scaleX(0);
        transition: transform 0.3s
        ease-in-out;
        position: absolute;
        bottom: 0;
        left: 0;
      }
      .nav1 a:hover::after {
        transform: scaleX(1);
      }
      .nav1 .login-button {
        background-color: #21a2c9;
        color: white;
        border: none;
        padding: 5px 15px;
        cursor: pointer;
      }
      .nav2{
        background-color: #89a9ca;
        width: 200px;
        padding: 20px;
      }
      .nav2 ul{
        list-style-type: none;
        margin: 0;
        padding: 0;
      }
      .nav2 li {
        margin-bottom: 12px;
      }
      .nav2 a{
        text-decoration: none;
        color: white;
        padding: 10px;
        width: 100%;
        display: block;
      }
      .nav2 a:hover {
        background-color: #21a2c9;
      }
      .nav2 .login-button {
        background-color: #21a2c9;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
        width: 100%;
      }
      .nav2 .login-button:hover {
        background-color: #1a8ab0;
        border: 1px solid;
      }
      .nav3 {
        background-color: #e87691;
        padding: 10px;
      }
      .nav3 ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      .nav3 a {
        text-decoration: none;
        color: white;
        padding: 10px 15px;
        display: block;
      }
      .nav3 .dropdown-content {
        display: none;
      }

      .nav3 .dropdown:hover .dropdown-content {
        display: block;
        position: absolute;
        color: #f8f9fa;
        min-width: 160px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      }
    </style>
</head>
<body>
    <div class="nav-container">
        <h2>Variation 1: Horizontal with underline effect</h2> 
            <nav class="nav1">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Products</a></li>
                    <li><button class="login-button">Login</button></li>
                </ul>
            </nav>
    </div>
    <div class="nav-container">
        <h2>Variation 2: Horizontal with hover effect</h2> 
            <nav class="nav2">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Products</a></li>
                </ul>
                <button class="login-button">Login</button>
            </nav>
    </div>
    <div class="nav-container">
        <h2>Variation 3: Horizontal with dropdown</h2> 
            <nav class="nav3">
                <ul>
                    <li><a href="#">Home</a></li>
                    <li class="dropdown">
                        <a href="#">About</a>
                        <div class="dropdown-content">
                            <a href="#">Team</a>
                            <a href="#">History</a>
                            <a href="#">Mission</a>
                        </div>
                    </li>
                    <li><a href="#">Products</a></li>
                    <li><button class="login-button">Login</button></li>
                </ul>
            </nav>
    </div>
</body>
</html>
