<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #1a1a1a;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .card{
        background-color: #9497ba;
        border-radius: 8px;
        padding: 30px;
        width: 300px;
    }
    h2{
        color: #292185;
        text-align: center;
        margin-bottom: 20px;
    }
    form{
        display: flex;
        flex-direction: column;
    }
    input{
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 8px;
        border: none;
        background-color: #d7c3c3;
    }
    button{
        padding: 10px;
        border-radius: 8px;
        border: none;
        background-color: #292185;
        color: white;
        cursor: pointer;
    }
</style>
<body>
    <div class="card">
        <h2>Login</h2>
        <form action="">
            <input type="email" name="" id="" placeholder="Email">
            <input type="password" name="" id="" placeholder="Password">
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
