<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .parent-container {
    margin: 0;
    padding: 0;
    position: relative;
    }
    .static-box {
       position: static;
        width: 200px;
        height: 200px;
        background-color: rgb(255, 0, 0);
        border: 2px solid black;
    }
    .relative-box{
        width: 200px;
        height: 200px;
        background-color: rgb(0, 0, 255);
        border: 2px solid black;
        position: relative;
        left: 50px;
        top: 50px;
}
.absolute-box{
    width: 200px;
    height: 200px;
    background-color: rgb(0, 255, 0);
    border: 2px solid black;
    position: absolute;
    top:30px;
    left: 30px;
}
</style>
<body>
    <div class="parent-container">
        <div class="static-box"></div>
        <div class="relative-box"></div>
        <div class="absolute-box"></div>
    </div>
</body>
</html>
