<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       body, html {
            padding: 0;
            margin: 0;
            height: 100%;
            font-family: "Oswald", sans-serif;
            background-color: #333;
        }
        .container {
            max-width: 1200px;
            padding: 20px;
        }
        .outside-carousel {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
        }
        .content {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            width: 100%;
            max-height: 550px;
        }
        .grid-container {
            display: grid;
            gap: 10px;
            padding: 10px;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        }
        .box {
            width: 100%;
            padding: 2px;
            background: #fff;
            color: #222;
            border-radius: 5px;
        }
        .btn{
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background-color: #645e5e;
            cursor:rgb(92, 89, 89)r;
            width: 80%;
            max-width: 300px;
            height: auto;
            transition: background-color 0.5s ease-in-out;
            box-shadow: 6px 4px 6px rgba(0, 0, 0, 0.5);
        }
        .btn:hover {
            color: #d8d0d0;
            background-color: #0b0b0b;
        }

        
    </style>
</head>

<body>
    <div class="container">
        <div class="outside-carousel">
            <div id="carouselExample" class="carousel slide">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="https://images.pexels.com/photos/29421579/pexels-photo-29421579.jpeg"
                            class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.pexels.com/photos/29421578/pexels-photo-29421578.jpeg"
                            class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="https://images.pexels.com/photos/29421577/pexels-photo-29421577.jpeg"
                            class="d-block w-100" alt="...">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExample"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
        <div class="content">
          <div class="grid-container">
            <div class="box">
                <img class="img-fluid" src="https://images.pexels.com/photos/18681383/pexels-photo-18681383.jpeg" alt="Image 1" srcset="">
                <h3 class="btn">Watch Now</h3>
            </div>
            <div class="box">
                <img class="img-fluid" src="https://images.pexels.com/photos/18264716/pexels-photo-18264716.jpeg" alt="Image 2" srcset="">
                <h3 class="btn">Watch Now</h3>
            </div>
            <div class="box">
                <img class="img-fluid" src="https://images.pexels.com/photos/18264705/pexels-photo-18264705.jpeg" alt="Image 3" srcset="">
                <h3 class="btn">Watch Now</h3>
            </div>
        </div>
        </div>
        <div class="footer">
            <p class="text-center text-white mt-3">© 2025 Your Company. All rights reserved.</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
</body>

</html>
