<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./output.css">
</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen">
    <div class="bg-gray-700 rounded-lg shadow-2xl p-8 max-w-sm w-full">
        <h2 class="text-center text-white text-3xl mb-1.5 font-bold" >Login</h2>
        <form class>
            <div>
                <label class="block text-white pb-1">Email</label>
                <input class="w-full p-2 rounded
                  bg-gray-600
                   text-white
                   rounded-b-md
                   focus:outline-none
                   focus:ring-2
                   focus:ring-blue-500
                   mb-2"
                   type="email" id="" name="" >
            </div>
            <div>
                <label class="block text-white pb-1" for="password">Password</label>
                <input class="w-full p-2 rounded
                  bg-gray-600
                   text-white
                   rounded-b-md
                   focus:outline-none
                   focus:ring-2
                   focus:ring-blue-500
                   mb-7"
                   type="password" name="password" required>
            </div>
            <button class="bg-blue-500
             text-white w-full 
               rounded-md
              hover:bg-blue-700
              py-2
              font-semibold
              shadow-2xl" type="submit">Login</button>
        </form>
    </div>
</body>

</html>
